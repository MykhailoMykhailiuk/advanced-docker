name: Docker CI

on:
  push:
    branches:
      - main

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Shift-left: run the test stage — build fails if pytest fails
      - name: Run tests (bild time)
        run: docker build --target tester -t advanced-docker:test .

      - name: Build Docker image
        run: docker build -t advanced-docker .

      # Scan for vulneribilities
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: advanced-docker:latest
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: sarif
          output: trivy-report.sarif
      
      - name: Upload Trivy Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-findings
          path: trivy-report.sarif
  
      # Virfy non-root
      - name: Verify container runs as non-root
        run: |
          docker run --rm advanced-docker whoami | tee whoami.txt
          if grep -q "^root$" whoami.txt; then
            echo "Container is running as root!"
            exit 1
          fi

      
